version: "3.8"
services:
  fastapi:
    build:
      context: ./back
      dockerfile: Dockerfile
    volumes:
      - ./back/src/files/camera:/app/src/files/camera
    ports:
      - "8000:8000"
    env_file:
      - ./back/.env
    depends_on:
      - postgres
      - redis
      - rabbitmq
  node:
    build:
      context: ./zoom
      dockerfile: Dockerfile
    depends_on:
       - redis
    ports:
      - "3030:3030"
    env_file:
      - ./zoom/.env
  quasar:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "8080:80"

  postgres:
    image: postgres:15
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}   
      POSTGRES_PASSWORD: ${DB_PASS}  
      POSTGRES_DB: ${DB_NAME}      
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_container
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    env_file:
      - ./back/.env

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_container
    restart: always
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Web UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  # pusher:
  #   build:
  #     context: ./pusher
  #     dockerfile: Dockerfile
  #   depends_on:
  #     rabbitmq:
  #      condition: service_healthy

  # bot:
  #   build:
  #     context: ./bot
  #     dockerfile: Dockerfile
  #   depends_on:
  #     rabbitmq:
  #      condition: service_healthy 
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: